<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:350px;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,.1);
}

h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#c00000;
    color:#fff;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="login-box">

    <h2>🔐 Admin Login</h2>

    <input
        type="text"
        id="login"
        placeholder="Login">

    <input
        type="password"
        id="password"
        placeholder="Parol">

    <button onclick="loginAdmin()">
        Kirish
    </button>

</div>

<script>

    const login =
        document.getElementById("login").value.trim();

    const password =
        document.getElementById("password").value.trim();

    if(

    ){
        window.location.href = "/admin/admin.html";
    }

    }

</script>

</body>
</html>
